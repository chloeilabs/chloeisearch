services:
  postgres:
    image: postgres:16-alpine
    container_name: chloei-cloud-agent-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: chloei
      POSTGRES_PASSWORD: chloei
      POSTGRES_DB: chloei_cloud_agent
    ports:
      - "55432:5432"
    volumes:
      - chloei-cloud-agent-postgres:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U chloei -d chloei_cloud_agent"]
      interval: 5s
      timeout: 3s
      retries: 20

volumes:
  chloei-cloud-agent-postgres:
