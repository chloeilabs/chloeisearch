name: Quality

on:
  push:
    branches:
      - main
  pull_request:

jobs:
  quality:
    name: quality
    runs-on: ubuntu-latest
    env:
      # Build/lint never call the Brave API; mock mode keeps CI hermetic (no secrets needed).
      BRAVE_MOCK: "1"
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Type check
        run: npx tsc --noEmit

      - name: Build
        run: npm run build
